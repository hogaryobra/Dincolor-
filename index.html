<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dincolor - Pinturerías Rosario</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1A1A1A; line-height: 1.6; background: #fff; overflow-x: hidden; }

/* ANIMACIONES */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes neonPulse {
  0%, 100% { text-shadow: 0 0 10px #B89DD0, 0 0 20px #B89DD0, 0 0 40px #4A2D5C, 0 0 80px #4A2D5C; }
  50% { text-shadow: 0 0 5px #B89DD0, 0 0 15px #B89DD0, 0 0 30px #4A2D5C, 0 0 60px #4A2D5C; }
}
@keyframes neonWhite {
  0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #B89DD0, 0 0 80px #B89DD0; }
  50% { text-shadow: 0 0 5px #fff, 0 0 15px #fff, 0 0 30px #B89DD0, 0 0 60px #B89DD0; }
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.95; }
  52% { opacity: 1; }
  54% { opacity: 0.97; }
}

/* HERO */
.dc-hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: 80px 24px 90px;
  color: #fff;
  border-bottom: 4px solid #4A2D5C;
  overflow: hidden;
  background-image: linear-gradient(rgba(10,5,15,0.85), rgba(20,10,30,0.9)), url('https://images.unsplash.com/photo-1562259949-e8e7689d7828?w=1600&q=80');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
.dc-hero::before {
  content: "";
  position: absolute;
  top: -50%;
  right: -20%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(184,157,208,0.25) 0%, transparent 70%);
  pointer-events: none;
  animation: pulse 6s ease-in-out infinite;
}

.dc-logo {
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 4px;
  margin-bottom: 12px;
  position: relative;
  opacity: 0;
  animation: fadeInUp 0.8s ease forwards, flicker 4s ease-in-out 1s infinite;
}
.dc-logo .din { color: #fff; animation: neonWhite 2s ease-in-out infinite; }
.dc-logo .color { color: #B89DD0; animation: neonPulse 2s ease-in-out infinite; }

.dc-tagline {
  color: #B89DD0;
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 50px;
  position: relative;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.3s forwards;
  text-shadow: 0 0 10px rgba(184,157,208,0.5);
}

.dc-hero h1 {
  font-size: 48px;
  font-weight: 800;
  line-height: 1.15;
  margin: 0 auto 20px;
  max-width: 750px;
  letter-spacing: -1px;
  position: relative;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.5s forwards;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.dc-hero h1 em {
  color: #B89DD0;
  font-style: normal;
  text-shadow: 0 0 20px #B89DD0, 0 0 40px #4A2D5C;
}

.dc-hero p {
  font-size: 18px;
  color: #ddd;
  max-width: 580px;
  margin: 0 auto 40px;
  position: relative;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.7s forwards;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.dc-cta-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.9s forwards;
}

/* BOTONES */
.dc-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 20px 38px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1px;
  text-decoration: none;
  text-transform: uppercase;
  transition: all 0.3s ease;
  cursor: pointer;
  border: none;
  position: relative;
  overflow: hidden;
}
.dc-btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: left 0.6s ease;
}
.dc-btn:hover::before { left: 100%; }
.dc-btn svg { width: 20px; height: 20px; }
.dc-btn-primary {
  background: linear-gradient(135deg, #4A2D5C 0%, #6d3f87 100%);
  color: #fff;
  box-shadow: 0 8px 25px rgba(74,45,92,0.5), 0 0 30px rgba(184,157,208,0.3);
}
.dc-btn-primary:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 35px rgba(74,45,92,0.7), 0 0 50px rgba(184,157,208,0.5);
}
.dc-btn-secondary {
  background: rgba(37,211,102,0.95);
  color: #fff;
  box-shadow: 0 8px 25px rgba(37,211,102,0.4);
}
.dc-btn-secondary:hover {
  background: #25D366;
  transform: translateY(-4px);
  box-shadow: 0 15px 35px rgba(37,211,102,0.6);
}

/* CONTADORES */
.dc-stats { background: linear-gradient(135deg, #1A1A1A 0%, #2a1a35 100%); color: #fff; padding: 70px 24px; position: relative; overflow: hidden; }
.dc-stats::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #4A2D5C, transparent); }
.dc-stats-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; text-align: center; }
.dc-stat { padding: 20px; opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
.dc-stat.visible { opacity: 1; transform: translateY(0); }
.dc-stat-number { font-size: 56px; font-weight: 800; color: #B89DD0; letter-spacing: -2px; line-height: 1; margin-bottom: 8px; display: block; text-shadow: 0 0 20px rgba(184,157,208,0.5); }
.dc-stat-plus { color: #B89DD0; }
.dc-stat-label { font-size: 14px; color: #ccc; text-transform: uppercase; letter-spacing: 2px; }
.dc-stat-stars { color: #FFD700; font-size: 18px; margin-top: 6px; }

/* CATEGORÍAS - LAYOUT MIXTO */
.dc-vcat-section { padding: 70px 24px; max-width: 1200px; margin: 0 auto; }

.dc-vcat-hero {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  height: 380px;
  text-decoration: none;
  display: block;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.8s ease, transform 0.8s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  cursor: pointer;
}
.dc-vcat-hero.visible { opacity: 1; transform: translateY(0); }
.dc-vcat-hero:hover { box-shadow: 0 30px 60px rgba(74,45,92,0.4); }

.dc-vcat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
.dc-vcat-small {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  height: 240px;
  text-decoration: none;
  display: block;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.8s ease, transform 0.8s ease;
  box-shadow: 0 8px 25px rgba(0,0,0,0.12);
  cursor: pointer;
}
.dc-vcat-small.visible { opacity: 1; transform: translateY(0); }
.dc-vcat-small:hover { box-shadow: 0 25px 50px rgba(74,45,92,0.4); }

.dc-vcat-img {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.6s ease;
  filter: saturate(0.9);
}
.dc-vcat-hero:hover .dc-vcat-img,
.dc-vcat-small:hover .dc-vcat-img {
  transform: scale(1.2);
  filter: saturate(1.3) brightness(1.1);
}

.dc-vcat-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(26,26,26,0.1) 0%, rgba(26,26,26,0.4) 50%, rgba(26,26,26,0.92) 100%);
  transition: background 0.6s ease;
}
.dc-vcat-hero:hover .dc-vcat-overlay,
.dc-vcat-small:hover .dc-vcat-overlay {
  background: linear-gradient(180deg, rgba(74,45,92,0.2) 0%, rgba(74,45,92,0.5) 50%, rgba(26,26,26,0.95) 100%);
}

.dc-vcat-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 30px 35px;
  color: #fff;
  z-index: 2;
  transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}
.dc-vcat-hero:hover .dc-vcat-content,
.dc-vcat-small:hover .dc-vcat-content {
  transform: translateY(-8px);
}
.dc-vcat-hero .dc-vcat-content h3 {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 0;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
